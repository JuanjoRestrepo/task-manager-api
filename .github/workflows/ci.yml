name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: tasks_db_test
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Deploy Migrations to CI Database
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/tasks_db_test
        run: npx prisma migrate deploy

      - name: Run Rate Limiting Tests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:password@localhost:5432/tasks_db_test
          JWT_SECRET: test-secret
        run: npx jest src/tests/rate-limit.test.ts

      - name: Run All Tests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:password@localhost:5432/tasks_db_test
          JWT_SECRET: test-secret
        run: npm test

      - name: Build
        run: npm run build
